name: Daily Build
on:
  schedule:
    - cron: '0 1 * * *' # Rebuild daily at 1am UTC (8am Thailand)
  workflow_dispatch: {} # Manual trigger
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
