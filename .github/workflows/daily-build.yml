name: Daily Build
on:
  schedule:
    - cron: '0 1 * * *' # Rebuild daily at 1am UTC (8am Thailand)
  workflow_dispatch: {} # Manual trigger
jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Push empty commit to trigger Cloudflare Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled rebuild for content publishing"
          git push
