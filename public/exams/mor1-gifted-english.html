Question: What will happen to late grant applications?`,
"ch":["They will be reviewed at the next deadline", "They will be rejected", "They will incur additional fees", "They will receive extended consideration"],"ans":"b"}
];

let score=0; const done={};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function render(f){
  const c=document.getElementById('qc');
  let list=f==='all'?[...Q]:Q.filter(q=>q.p===f);
  shuffle(list);
  let h='';
  list.forEach((q,i)=>{
    const st=done[q.n];
    const icon=st==='ok'?'✅':st==='no'?'❌':'';
    let chs='';
    q.ch.forEach((t,ci)=>{
      chs+=`<div class="ch" data-q="${q.n}" data-l="${LABELS[ci]}" onclick="pick(this,${q.n},'${LABELS[ci]}')"><span class="ch-l">${LABELS[ci]}</span><span class="ch-t">${t}</span></div>`;
    });
    h+=`<div class="q-card" style="animation-delay:${i*.025}s">
      <div class="q-hdr"><span class="q-n">${i+1}</span><span class="q-part ${q.p}">${PARTS[q.p]}</span><span class="q-st" id="st-${q.n}">${icon}</span></div>
      <div class="q-body"><div class="qtext">${q.b}</div></div>
      <div class="choices">${chs}</div>
      <div class="exp" id="exp-${q.n}" data-a="${q.ans}">
        <button class="exp-btn" onclick="toggle(${q.n})"><span class="ar">▶</span> ดูเฉลย</button>
        <div class="exp-c" id="exc-${q.n}"><strong>เฉลย: ${q.ans})</strong> ${q.ch[LABELS.indexOf(q.ans)]}</div>
      </div>
    </div>`;
  });
  c.innerHTML=h;
}

function pick(el,n,l){
  if(done[n]) return;
  document.querySelectorAll(`.ch[data-q="${n}"]`).forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function toggle(n){
  const exp=document.getElementById('exp-'+n);
  const exc=document.getElementById('exc-'+n);
  const btn=exp.querySelector('.exp-btn');
  const ans=exp.dataset.a;
  const isOpen=exc.classList.contains('show');
  if(isOpen){exc.classList.remove('show');btn.classList.remove('open');exp.classList.remove('rev');
    document.querySelectorAll(`.ch[data-q="${n}"]`).forEach(c=>{c.classList.remove('ok','no')});return}
  exc.classList.add('show');btn.classList.add('open');exp.classList.add('rev');
  let selected=null;
  document.querySelectorAll(`.ch[data-q="${n}"]`).forEach(c=>{
    c.classList.remove('ok','no');
    if(c.classList.contains('sel'))selected=c.dataset.l;
    if(c.dataset.l===ans)c.classList.add('ok');
    else if(c.classList.contains('sel'))c.classList.add('no');
  });
  if(selected&&!done[n]){
    done[n]=selected===ans?'ok':'no';
    if(selected===ans)score++;
    document.getElementById('st-'+n).textContent=done[n]==='ok'?'✅':'❌';
    document.getElementById('sc').textContent=score+' / 50';
  }
}

function revealAll(){Q.forEach(q=>{const exc=document.getElementById('exc-'+q.n);if(exc&&!exc.classList.contains('show'))toggle(q.n)})}
function resetAll(){score=0;Object.keys(done).forEach(k=>delete done[k]);document.getElementById('sc').textContent='0 / 50';render(document.querySelector('.toolbar button.active').dataset.f||'all')}

document.querySelectorAll('.toolbar button[data-f]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.toolbar button[data-f]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render(btn.dataset.f);
  });
});
render('all');
</script>
