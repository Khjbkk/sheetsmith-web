<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface-alt: #EEEBE5;
    --border: #DDD8CE;
    --border-light: #E8E4DC;
    --text: #2A2722;
    --text-muted: #8A847A;
    --accent: #8B4513;
    --accent-light: #FDF5EC;
    --accent-dark: #6B3410;
    --correct: #1A6B4E;
    --correct-bg: #E8F5EE;
    --correct-border: #B8DCCB;
    --wrong: #C53030;
    --wrong-bg: #FDE8E8;
    --wrong-border: #F5B7B7;
    --gold: #C9A84C;
    --gold-bg: #FDF8EC;
    --shadow-sm: 0 1px 3px rgba(44,42,38,0.06);
    --shadow-md: 0 4px 12px rgba(44,42,38,0.08);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sarabun','Noto Sans Thai',sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.75; font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,243,238,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 10px 24px;
    display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
  }
  .toolbar button {
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.2s;
  }
  .toolbar button:hover, .toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar .score { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:var(--accent); background:var(--accent-light); padding:5px 14px; border-radius:20px; border:1px solid var(--border); }

  .container { max-width: 840px; margin: 0 auto; padding: 24px 20px 80px; }



  .q-card {
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: var(--radius); margin-bottom: 16px; box-shadow: var(--shadow-sm);
    overflow: hidden; transition: box-shadow 0.25s; animation: fadeUp 0.35s ease both;
  }
  .q-card:hover { box-shadow: var(--shadow-md); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .q-header { display:flex; align-items:center; gap:12px; padding:14px 18px 10px; border-bottom:1px solid var(--border-light); }
  .q-num {
    font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600;
    background: var(--accent); color:#fff; width:34px; height:34px;
    display:flex; align-items:center; justify-content:center; border-radius:8px; flex-shrink:0;
  }
  .q-status { margin-left:auto; font-size:20px; }

  .q-body { padding:14px 18px; }
  .q-body .math-expr {
    font-size: 17px; line-height: 2; padding: 10px 0;
  }
  .q-body img { max-width:100%; height:auto; border-radius:var(--radius-sm); margin:8px 0; }

  .q-input-row { padding: 0 18px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .q-input-row label { font-weight:600; font-size:14px; color:var(--text-muted); }
  .q-input-row input {
    font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:500;
    padding: 8px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface-alt); color: var(--text); width: 200px;
    transition: border-color 0.2s; outline:none;
  }
  .q-input-row input:focus { border-color: var(--accent); }
  .q-input-row input.correct-input { border-color: var(--correct); background: var(--correct-bg); }
  .q-input-row input.wrong-input { border-color: var(--wrong); background: var(--wrong-bg); }
  .q-input-row .check-btn {
    font-family:inherit; font-size:13px; font-weight:600; padding:8px 18px;
    border-radius:var(--radius-sm); border:none; cursor:pointer;
    background:var(--accent); color:#fff; transition:all 0.2s;
  }
  .q-input-row .check-btn:hover { background:var(--accent-dark); }

  .explanation {
    margin:0 18px 14px; background:#f7f6f2;
    border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
  }
  .explanation.revealed { background:var(--correct-bg); border-color:var(--correct-border); }
  .explanation-toggle {
    width:100%; display:flex; align-items:center; gap:8px;
    padding:12px 16px; background:none; border:none; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:600; color:var(--text-muted); text-align:left;
  }
  .explanation.revealed .explanation-toggle { color:var(--correct); }
  .explanation-toggle .arrow { transition:transform 0.25s; font-size:12px; }
  .explanation-toggle.open .arrow { transform:rotate(90deg); }
  .explanation-content { display:none; padding:0 16px 14px; font-size:15px; line-height:1.85; color:#2C3E2C; }
  .explanation-content.show { display:block; }
  .explanation-content img { max-width:100%; height:auto; border-radius:4px; margin:8px 0; border:1px solid var(--border-light); }


  @media (max-width:600px) {
    .container { padding:16px 12px 60px; }
    .q-header { padding:10px 12px 8px; }
    .q-body { padding:10px 12px; }
    .q-input-row { padding:0 12px 10px; }
    .q-input-row input { width:150px; }
    .explanation { margin:0 12px 10px; }
  }
</style>

{n:20, sec:"world",
 q: String.raw`$\frac{1994+1993 \times 1995}{1994 \times 1995-1}+\frac{1995+1994 \times 1996}{1995 \times 1996-1}+\frac{1996+1995 \times 1997}{1996 \times 1997-1} = $`,
 ans:"3", ansDisplay:"3",
 ex: String.raw`เนื่องจาก $\frac{a+(a-1)(a+1)}{a(a+1)-1}=1$<br><br>จากโจทย์ $=1+1+1=3$`},
];

let score = 0;
const answered = {};

function render(filter) {
  const c = document.getElementById('qContainer');
  let list = filter === 'all' ? [...Q] : Q.filter(q => q.sec === filter);
  // shuffle
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  let h = '';
  let curSec = '';
  // For "all" mode, group by section
  if (filter === 'all') {
    const calc = list.filter(q=>q.sec==='calc');
    const world = list.filter(q=>q.sec==='world');
    list = [...calc, ...world];
  }
  list.forEach((q, i) => {

    const st = answered[q.n];
    const statusIcon = st === 'correct' ? '✅' : st === 'wrong' ? '❌' : '';
    h += `
    <div class="q-card" data-qn="${q.n}" style="animation-delay:${i*0.03}s">
      <div class="q-header">
        <span class="q-num">${i+1}</span>
        <span class="q-status" id="status-${q.n}">${statusIcon}</span>
      </div>
      <div class="q-body"><div class="math-expr">${q.q} ______</div></div>
      <div class="q-input-row">
        <label>คำตอบ:</label>
        <input type="text" id="inp-${q.n}" placeholder="พิมพ์คำตอบ..." onkeydown="if(event.key==='Enter')checkAns(${q.n})">
        <button class="check-btn" onclick="checkAns(${q.n})">ตรวจ</button>
      </div>
      <div class="explanation" id="exp-${q.n}">
        <button class="explanation-toggle" onclick="toggleExp(${q.n})">
          <span class="arrow">▶</span> ดูเฉลยและวิธีทำ
        </button>
        <div class="explanation-content" id="exc-${q.n}">
          <p style="margin-bottom:8px;font-size:16px"><strong>เฉลย: ${q.ansDisplay}</strong></p>
          ${q.ex}
        </div>
      </div>
    </div>`;
  });

  c.innerHTML = h;
  renderMathInElement(document.body, {delimiters:[{left:'$',right:'$',display:false},{left:'$$',right:'$$',display:true}]});
}

function normalize(s) {
  return s.replace(/,/g,'').replace(/\s+/g,' ').trim().toLowerCase();
}

function checkAns(n) {
  const q = Q.find(x=>x.n===n);
  const inp = document.getElementById('inp-'+n);
  const userAns = normalize(inp.value);
  const correctAns = normalize(q.ans);
  // Accept multiple formats
  const alts = [correctAns];
  // For fractions like "1/32", also accept "1/32"
  // For mixed like "3 1/9", also accept "3 1/9" or "28/9"
  const isCorrect = alts.some(a => userAns === a);
  
  inp.classList.remove('correct-input','wrong-input');
  const statusEl = document.getElementById('status-'+n);
  
  if (isCorrect) {
    inp.classList.add('correct-input');
    statusEl.textContent = '✅';
    if (!answered[n]) { answered[n] = 'correct'; score++; }
  } else {
    inp.classList.add('wrong-input');
    statusEl.textContent = '❌';
    if (!answered[n]) { answered[n] = 'wrong'; }
  }
  document.getElementById('scoreDisplay').textContent = score + ' / 20';
}

function toggleExp(n) {
  const exp = document.getElementById('exp-'+n);
  const exc = document.getElementById('exc-'+n);
  const btn = exp.querySelector('.explanation-toggle');
  const isOpen = exc.classList.contains('show');
  if (isOpen) { exc.classList.remove('show'); btn.classList.remove('open'); exp.classList.remove('revealed'); }
  else { exc.classList.add('show'); btn.classList.add('open'); exp.classList.add('revealed');
    renderMathInElement(exc, {delimiters:[{left:'$',right:'$',display:false},{left:'$$',right:'$$',display:true}]}); }
}

function revealAll() {
  Q.forEach(q => { const exc=document.getElementById('exc-'+q.n); if(exc&&!exc.classList.contains('show')) toggleExp(q.n); });

}
function resetAll() {
  score = 0; Object.keys(answered).forEach(k=>delete answered[k]);
  document.getElementById('scoreDisplay').textContent = '0 / 20';
  render(document.querySelector('.toolbar button.active').dataset.filter || 'all');
}

document.querySelectorAll('.toolbar button[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toolbar button[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render('all');
</script>
</body>
